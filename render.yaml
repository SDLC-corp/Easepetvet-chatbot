# Render Blueprint — backend API + managed PostgreSQL (with pgvector).
# Deploy: Render Dashboard -> New + -> Blueprint -> connect this repo -> Apply.
# Secrets marked "sync: false" are NOT in git; set them in the Render dashboard.

databases:
  - name: easepetvet-db
    databaseName: easepetvet
    user: easepetvet
    plan: free            # free DB expires after 90 days; use "starter" for production

services:
  - type: web
    name: easepetvet-backend
    runtime: node
    rootDir: backend
    plan: free            # free web service sleeps when idle; use "starter" for production
    buildCommand: npm ci
    startCommand: npm run migrate:up && npm start
    healthCheckPath: /api/chat/health
    envVars:
      - key: NODE_ENV
        value: production
      # Postgres connection string is wired automatically from the database above.
      - key: DATABASE_URL
        fromDatabase:
          name: easepetvet-db
          property: connectionString
      # ---- secrets: set these values in the Render dashboard ----
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OLLAMA_API_KEY
        sync: false
      - key: OPENAI_API_KEY          # used for embeddings during ingestion
        sync: false
      - key: ADMIN_DASHBOARD_TOKEN
        sync: false
      # Encrypts email + phone at rest. Set any long secret; keep it stable.
      - key: DATA_ENCRYPTION_KEY
        sync: false
      # Comma-separated origins allowed to call the API (your Vercel URL + the site
      # that embeds the widget). Example:
      # https://easepetvet-frontend.vercel.app,https://easepetvet.com,https://www.easepetvet.com
      - key: CHAT_WIDGET_ALLOWED_ORIGINS
        sync: false
      # ---- non-secret defaults ----
      # Use Gemini for embeddings (no OpenAI key needed). Must match the provider
      # used to generate the stored vectors, so set this BEFORE running ingestion.
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: ADMIN_DASHBOARD_TIMEZONE
        value: America/Chicago
      - key: CHAT_SUPPORT_EMAIL
        value: support@easepetvet.com
